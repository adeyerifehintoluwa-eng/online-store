<!DOCTYPE html>
<html lang="en">

<head>
    <base href="../">
  <meta charset="UTF-8">
  <meta name="description" content="Ashion Template">
  <meta name="keywords" content="Ashion, fashion, html">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Women | Ashion</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Css Styles -->
  <link rel="stylesheet" href="css/bootstrap.min.css" type="text/css">
  <link rel="stylesheet" href="css/font-awesome.min.css" type="text/css">
  <link rel="stylesheet" href="css/elegant-icons.css" type="text/css">
  <link rel="stylesheet" href="css/jquery-ui.min.css" type="text/css">
  <link rel="stylesheet" href="css/magnific-popup.css" type="text/css">
  <link rel="stylesheet" href="css/owl.carousel.min.css" type="text/css">
  <link rel="stylesheet" href="css/slicknav.min.css" type="text/css">
  <link rel="stylesheet" href="css/style.css" type="text/css">
</head>

<body>
  <div id="preloder">
    <div class="loader"></div>
  </div>

  <div class="offcanvas-menu-overlay"></div>
  <div class="offcanvas-menu-wrapper">
    <div class="offcanvas__close">+</div>
    <ul class="offcanvas__widget">
      <li><span class="icon_search search-switch"></span></li>
      <li><a href="#"><span class="icon_heart_alt"></span><div class="tip">2</div></a></li>
      <li><a href="./shop-cart/"><span class="icon_bag_alt"></span><div class="tip">0</div></a></li>
    </ul>
    <div class="offcanvas__logo">
      <a href="./"><img src="img/logo.png" alt=""></a>
    </div>
    <div id="mobile-menu-wrap"></div>
    <div class="offcanvas__auth">
      <a href="./login/">Login</a>
      <a href="./signup/">Register</a>
    </div>
  </div>

  <header class="header">
    <div class="container-fluid">
      <div class="row">
        <div class="col-xl-3 col-lg-2">
          <div class="header__logo">
            <a href="./"><img src="img/logo.png" alt=""></a>
          </div>
        </div>

        <div class="col-xl-6 col-lg-7">
          <nav class="header__menu">
            <ul>
              <li><a href="./">Home</a></li>
              <li class="active"><a href="./women/">Women's</a></li>
              <li><a href="./men/">Men's</a></li>
              <li><a href="./shop/">Shop</a></li>
              <li><a href="./blog/">Blog</a></li>
              <li><a href="./contact/">Contact</a></li>
            </ul>
          </nav>
        </div>
        <div class="col-lg-3">
          <div class="header__right">
            <div class="header__right__auth">
              <a href="./login/">Login</a>
              <a href="./signup/">Register</a>
            </div>
            <ul class="header__right__widget">
              <li><span class="icon_search search-switch"></span></li>
              <li><a href="#"><span class="icon_heart_alt"></span><div class="tip">2</div></a></li>
              <li><a href="./shop-cart/"><span class="icon_bag_alt"></span><div class="tip">0</div></a></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="canvas__open">
        <i class="fa fa-bars"></i>
      </div>
    </div>
  </header>

  <!-- Breadcrumb -->
  <div class="breadcrumb-option">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="breadcrumb__links">
            <a href="./"><i class="fa fa-home"></i> Home</a>
            <span>Women's Collection</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Women Category Menu (4 sections) -->
  <section class="product spad" style="padding-bottom: 0;">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <ul class="filter__controls" style="margin-bottom: 25px;">
            <li class="active"><a href="#wears" style="color: inherit;">Wears</a></li>
            <li><a href="#bags" style="color: inherit;">Bags</a></li>
            <li><a href="#shoes" style="color: inherit;">Shoes</a></li>
            <li><a href="#jewelry" style="color: inherit;">Jewelry</a></li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <!-- 1) WEARS -->
  <section id="wears" class="product spad">
    <div class="container">
      <div class="row">
        <div class="col-lg-12">
          <div class="section-title">
            <h4>Women's Wears</h4>
          </div>
        </div>
      </div>

      <div id="womenWearsProducts" class="row"></div>
    </div>
  </section>

 <!-- 2) BAGS -->
<section id="bags" class="product spad">
  <div class="container">

    <div class="row">
      <div class="col-lg-12">
        <div class="section-title">
          <h4>Bags</h4>
        </div>
      </div>
    </div>

    <!-- Products Row -->
    <div id="womenBagsProducts" class="row"></div>

  </div>
</section>

  <!-- 4) JEWELRY -->
<section id="jewelry" class="product spad">
  <div class="container">

    <!-- Section Title -->
    <div class="row">
      <div class="col-lg-12">
        <div class="section-title">
          <h4>Jewelry</h4>
        </div>
      </div>
    </div>

    <!-- Jewelry Products -->
    <div id="womenJewelryProducts" class="row"></div>
  </div>
</section>

  <div class="search-model">
    <div class="h-100 d-flex align-items-center justify-content-center">
      <div class="search-close-switch">+</div>
      <form class="search-model-form">
        <input type="text" id="search-input" placeholder="Search here.....">
      </form>
    </div>
  </div>

  <!-- Js Plugins -->
  <script src="js/jquery-3.3.1.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.magnific-popup.min.js"></script>
  <script src="js/jquery-ui.min.js"></script>
  <script src="js/mixitup.min.js"></script>
  <script src="js/jquery.countdown.min.js"></script>
  <script src="js/jquery.slicknav.js"></script>
  <script src="js/owl.carousel.min.js"></script>
  <script src="js/jquery.nicescroll.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/product-catalog.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/storefront.js"></script>

</body>
</html>
